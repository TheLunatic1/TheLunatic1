<svg width="100%" height="100%" viewBox="0 0 440 190" fill="none" xmlns="http://www.w3.org/2000/svg" style="max-width: 440px; display: block; margin: 0 auto;">
  <style>
    .title { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 18px; fill: #f8f8f2; }
    .lang-name { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 13px; fill: #f8f8f2; }
    .lang-percent { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 500; font-size: 12.5px; fill: #6272a4; }
    .glow { filter: drop-shadow(0px 0px 8px rgba(139, 233, 253, 0.3)); }
  </style>
  <defs>
    <linearGradient id="lang-card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282a36" />
      <stop offset="100%" stop-color="#1e1f29" />
    </linearGradient>
    <linearGradient id="lang-border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8be9fd" />
      <stop offset="50%" stop-color="#bd93f9" />
      <stop offset="100%" stop-color="#ff79c6" />
    </linearGradient>
    <clipPath id="bar-clip">
      <rect x="28" y="55" width="384" height="12" rx="6" />
    </clipPath>
  </defs>

  <!-- Background Card -->
  <rect x="1.5" y="1.5" width="437" height="187" rx="16" fill="url(#lang-card-grad)" stroke="url(#lang-border-grad)" stroke-width="2" class="glow" />

  <!-- Card Title -->
  <text x="28" y="38" class="title">Most Used Languages</text>

  <!-- Progress Bar Container -->
  <g clip-path="url(#bar-clip)">
    <rect x="28" y="55" width="168.07680000000002" height="12" fill="#f1fa8c" />
    <rect x="196.07680000000002" y="55" width="130.6752" height="12" fill="#3178c6" />
    <rect x="326.752" y="55" width="34.944" height="12" fill="#e34f26" />
    <rect x="361.696" y="55" width="27.5328" height="12" fill="#bd93f9" />
    <rect x="389.22880000000004" y="55" width="11.443200000000001" height="12" fill="#ff79c6" />
    <rect x="400.672" y="55" width="11.2896" height="12" fill="#8be9fd" />
  </g>

  <!-- Languages Grid -->
  <g transform="translate(28, 96)">
      <circle cx="6" cy="6" r="6" fill="#f1fa8c" />
      <text x="20" y="10" class="lang-name">JavaScript</text>
      <text x="110" y="10" class="lang-percent">43.77%</text>
    </g>
    <g transform="translate(230, 96)">
      <circle cx="6" cy="6" r="6" fill="#3178c6" />
      <text x="20" y="10" class="lang-name">TypeScript</text>
      <text x="110" y="10" class="lang-percent">34.03%</text>
    </g>
    <g transform="translate(28, 124)">
      <circle cx="6" cy="6" r="6" fill="#e34f26" />
      <text x="20" y="10" class="lang-name">HTML</text>
      <text x="62" y="10" class="lang-percent">9.1%</text>
    </g>
    <g transform="translate(230, 124)">
      <circle cx="6" cy="6" r="6" fill="#bd93f9" />
      <text x="20" y="10" class="lang-name">CSS</text>
      <text x="54" y="10" class="lang-percent">7.17%</text>
    </g>
    <g transform="translate(28, 152)">
      <circle cx="6" cy="6" r="6" fill="#ff79c6" />
      <text x="20" y="10" class="lang-name">SCSS</text>
      <text x="62" y="10" class="lang-percent">2.98%</text>
    </g>
    <g transform="translate(230, 152)">
      <circle cx="6" cy="6" r="6" fill="#8be9fd" />
      <text x="20" y="10" class="lang-name">Less</text>
      <text x="62" y="10" class="lang-percent">2.94%</text>
    </g>
</svg>